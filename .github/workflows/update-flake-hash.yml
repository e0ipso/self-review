name: Update flake hash

on:
  release:
    types: [published]

jobs:
  update:
    name: Update flake.nix hash for new release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Compute new zip hash
        id: hash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          URL="https://github.com/e0ipso/self-review/releases/download/v${VERSION}/self-review-${VERSION}-linux-x64.zip"
          HASH=$(nix store prefetch-file --hash-type sha256 --json "$URL" | jq -r '.hash')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Update hash in flake.nix
        run: |
          sed -i 's|hash = "sha256-.*"|hash = "${{ steps.hash.outputs.hash }}"|' flake.nix

      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update flake hash for ${{ github.event.release.tag_name }}"
          title: "chore: update flake hash for ${{ github.event.release.tag_name }}"
          body: |
            Automated update of `flake.nix` zip hash for release ${{ github.event.release.tag_name }}.
          branch: flake-hash-${{ github.event.release.tag_name }}
          labels: dependencies
